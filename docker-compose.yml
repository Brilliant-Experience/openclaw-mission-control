services:
  mission-control:
    build: .
    ports:
      - "127.0.0.1:3030:3000"
    env_file:
      - /opt/openclaw/mission-control/.env
    environment:
      # Gateway URL (uses token from env_file above)
      - OPENCLAW_GATEWAY_URL=http://openclaw-openclaw-gateway-1:18789
      - OPENCLAW_AUTH_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      # Google OAuth (credentials from env_file)
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_URL=https://openclaw-vps.tail28b62f.ts.net:3030
    volumes:
      - /opt/openclaw/config:/data/config:ro
      - /opt/openclaw/workspace/team:/data/workspace:ro
      # Delivery queue access (for purge action)
      - /home/node/.openclaw/delivery-queue:/home/node/.openclaw/delivery-queue:rw
      # Config backup destination
      - /root/config-backups:/root/config-backups:rw
    networks:
      - openclaw_default
    restart: unless-stopped

networks:
  openclaw_default:
    external: true
